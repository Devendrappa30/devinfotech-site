{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="text-center mb-4">Get in Touch</h1>
            <p class="text-center text-muted">Ready to transform your business? Fill the form below or email us at info@devinfotech.in</p>
            
            <form method="POST" class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Message / Requirement</label>
                        <textarea name="message" rows="5" class="form-control" required placeholder="Tell us about your Zendesk, Salesforce or Jira needs..."></textarea>
                    </div>
                    <div class="col-12 text-center">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Send Message</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
